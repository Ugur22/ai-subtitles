steps:
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=us-central1-docker.pkg.dev/ai-subs-poc/ai-subs-repo/ai-subs-backend:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--context=.'
      - '--dockerfile=Dockerfile'
images:
  - 'us-central1-docker.pkg.dev/ai-subs-poc/ai-subs-repo/ai-subs-backend:latest'
timeout: '2700s'  # 45 minutes (large image with ML models)
options:
  machineType: 'E2_HIGHCPU_8'
